<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>CheerpJ Demo | File Upload & Download</title>

		<link rel="stylesheet" href="style.css" />
	</head>

	<body>
		<header>
			<div class="brand">
				<div class="brand-logo">Cheerp<span>J</span></div>
				<span class="demo-badge">Applet Demo</span>
			</div>
			<div class="header-content">
				<h1 class="header-title">&#x270F;&#xFE0F; Text Editor Applet</h1>
				<div class="header-subtitle">Seamless Java Applet Integration</div>
			</div>
		</header>

		<div class="top-banner">
			To use this demo install the AppletRunner extension (<a
				href="https://chromewebstore.google.com/detail/cheerpj-applet-runner/bbmolahhldcbngedljfadjlognfaaein"
				target="_blank"
				rel="noopener noreferrer"
				>Chrome</a
			>
			/
			<a
				href="https://microsoftedge.microsoft.com/addons/search/cheerpj"
				target="_blank"
				rel="noopener noreferrer"
				>Edge</a
			>). Read more about it
			<a
				href="https://cheerpj.com/cheerpj-applet-runner/"
				target="_blank"
				rel="noopener noreferrer"
				>here</a
			>.
		</div>

		<main class="app-main">
			<div id="applet-container">
				<cheerpj-applet
					archive="NoteAppletDemo.jar"
					code="NoteApplet"
					width="100%"
					height="100%"
				>
					Your browser cannot handle the applet tag!
				</cheerpj-applet>
			</div>
		</main>

		<footer>&copy; 2026 Leaning Technologies</footer>
	</body>
</html>
